# Pixi is the single source of truth for the environment (matches the
# ar7_wg1_ch5 convention so authors only learn one tool).
#   pixi install        # build the environment
#   pixi run test       # run the test suite
#   pixi shell          # drop into the environment
[workspace]
name = "ar7-ch5-ensemble"
version = "0.1.0"
description = "AR7 WG1 Chapter 5 climate runs across FaIR, CICERO-SCM and MAGICC"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64"]

[tasks]
test = "pytest"
lint = "ruff check ."
format = "ruff format ."

# Pin the BLAS / OpenMP thread pools to one thread each. This must be set before
# numpy is imported, so it lives in the environment rather than in code. On NAC
# (256 logical cores, strict memory overcommit) an unpinned numpy reserves a
# per-core arena that balloons each process's virtual size into the tens of GB;
# the SCM worker pools then fail to fork (OSError: Cannot allocate memory).
# One BLAS thread per worker keeps the virtual footprint small; parallelism
# comes from the worker processes (see DEFAULT_MAX_WORKERS), not BLAS threads.
[activation.env]
OMP_NUM_THREADS = "1"
OPENBLAS_NUM_THREADS = "1"
MKL_NUM_THREADS = "1"
NUMEXPR_NUM_THREADS = "1"
VECLIB_MAXIMUM_THREADS = "1"

# Scientific base from conda-forge.
[dependencies]
python = "3.11.*"
numpy = "*"
pandas = ">=2.2"
scipy = "*"
netcdf4 = "*"
# pyarrow reads the global history anchor (feather, Zenodo 17845154) used by
# the light SSP2-COM harmoniser.
pyarrow = "*"
openpyxl = "*"
matplotlib = "*"
tqdm = "*"
pyyaml = "*"
jupyterlab = "*"
pytest = "*"
ruff = "*"
pip = "*"

# Climate models, scenario IO, and the SCM engine.
# Engine is pinned to the upstream openscm-runner feature branch hosting
# the modernised FaIR2 / CICEROSCMPY2 adapters, the run-mode enum, and
# the strict canonical RCMIP3 splice path. See
# ar7-ch5-ensemble-brief.md section 3 and
# docs/engine_upstream_switch.md for the upstream contract and our
# pathway_id / canonical-scenario shim.
[pypi-dependencies]
ar7-ch5 = { path = ".", editable = true }
openscm-runner = { git = "https://github.com/openscm/openscm-runner.git", branch = "feat/fair2-ciceroscmpy2-adapters-and-runmode-nonfork" }
fair = ">=2.2.4"
ciceroscm = "==2.1.2"
pymagicc = "*"
pyam-iamc = "*"
scmdata = "*"
# Jupytext pairs the figure-script .py files with .ipynb notebooks (.ipynb
# is generated on demand and gitignored). Pixi pulls it as a pypi dep
# because the conda-forge build lags occasionally.
jupytext = "*"
# Post-processing utilities for the climate-assessment workflow (Zeb's AR6
# successor to climate-assessment). We use the bare package (no [ar6] extra,
# so aneris / silicone / pymagicc are NOT pulled by gcages); only the
# gcages.ar6.post_processing functions are consumed.
gcages = ">=0.14,<0.15"

# MAGICC needs the path to the licensed binary. Do not hardcode it here (it is
# machine-specific); set it in your shell or a gitignored .env.local, e.g.
#   export MAGICC_EXECUTABLE_7=/storage/no-backup-nac/users/bensan/magicc-dist/magicc7/bin/magicc
# See docs/data_setup.md.
