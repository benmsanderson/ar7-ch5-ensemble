name: docs

# Build the MkDocs site and publish it to GitHub Pages on every push to main,
# so the documentation at the Pages URL always tracks the code. Mirrors the
# ReadTheDocs install (`pip install .[docs]`) rather than the full pixi engine
# environment, since the docs build only needs the package source + MkDocs.

on:
  push:
    branches: [main]
  # Allow manual rebuilds from the Actions tab.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deploy; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install docs dependencies
        run: pip install .[docs]

      - name: Build site (strict)
        run: mkdocs build --strict

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
