# ReadTheDocs build configuration.
# Docs are MkDocs Material + mkdocstrings; the local source of truth for the
# environment is pixi (pixi.toml), but RTD installs the package with its `docs`
# extra via pip so the API reference can import ar7_ch5.
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.11"

mkdocs:
  configuration: mkdocs.yml

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs
