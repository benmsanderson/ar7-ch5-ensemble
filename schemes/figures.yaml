# Per-figure spec for AR7 WG1 Ch5 figures.
#
# Each top-level key is a figure id (also the filename for output and the
# matching notebook script). Figure scripts in `notebooks/figXX_*.py` load
# their slice via `ar7_ch5.figures.load_config(<figure_id>)`.
#
# Keep entries small; per-figure detail (axis ranges, annotations) lives
# in the script. The config controls "which data goes into this figure"
# decisions that chapter authors would want to edit by hand.

fig01_classification:
  title: GW0-GW8 classification distribution (SCI)
  experiment: sci
  # xlsx == MAGICC percentiles baked in the SCI xlsx (the regression path).
  # per_model / pooled use the 3-SCM ensemble metrics path (M5+).
  source: xlsx
  # Plot both the full set and the vetted-only subset side-by-side.
  show_vetted_only: true
  output_formats: [png, pdf]

fig03_classification_per_scm:
  # Per-SCM GW0-GW8 classification summary across the three chapter input
  # sets (SCI, ScenarioMIP CMIP7, SSP2-COM). One column per source; per
  # column a stacked bar per SCM (plus an xlsx-MAGICC reference stack for
  # SCI) showing how many pathways land in each Riahi 2026 (Table SI.3)
  # GW category. Reads outputs/classification_*.csv produced by
  # scripts/classify.py.
  title: "GW0-GW8 classification per SCM across chapter input sets"
  experiment: classification
  source: per_model
  output_formats: [png, pdf]

fig04_ssp2com_validation:
  # Reference comparison: our SSP2-COM driving emissions vs Charlie Koven's
  # FaIR-only SSP2-COM pipeline. Reads
  # outputs/ssp2com/validation_vs_charlie.csv (produced by
  # scripts/validate_ssp2com_vs_charlie.py during M5). The two systematic
  # differences (Charlie's L-fallback for 8 HFCs; PFC 2025 baseline anomaly
  # from history disagreement) are explained in docs/methods.md and
  # surfaced explicitly on the figure.
  title: "SSP2-COM driving emissions: chapter vs Charlie Koven (M5 validation)"
  experiment: ssp2com
  source: validation_vs_charlie
  output_formats: [png, pdf]

fig06_per_scm_grid:
  # Per-SCM grid: 4 rows (CO2 concentration, CH4 concentration, total
  # ERF, GSAT anomaly) x 3 columns (fair, ciceroscm, magicc). Each
  # panel shows that single SCM's 8-pathway ensemble for that
  # variable (7 ScenarioMIP CMIP7 baselines + SSP2-COM). Easier than
  # fig05 to read the per-SCM behaviour because SCMs are separated
  # rather than overlaid.
  #
  # SSP2-COM data ends at 2100 (its source horizon); its trace stops
  # at 2100 on every panel.
  title: "ScenarioMIP CMIP7 + SSP2-COM ensembles per SCM (CO2, CH4, ERF, GSAT)"
  experiment: scenariomip_cmip7
  models: [fair, ciceroscm, magicc]
  pathways: [VL, L, LN, M, ML, H, HL, SSP2-com]
  output_formats: [png, pdf]

fig05_scenariomip_extensions:
  # 8-panel diagnostic for ScenarioMIP CMIP7 baselines, reproducing the
  # layout of fig_extensions in scenariomip-paper-plots (Zenodo 20329427,
  # notebooks/0505_extensions_plotting.ipynb). Driven by our pipeline's
  # NetCDFs at outputs/scenariomip_cmip7/<scm>/scenariomip_<pathway>.nc,
  # so the figure also serves as a three-SCM comparison: each pathway's
  # ERF / CO2 concentration / GSAT trace shows fair (solid + 5-95% band),
  # ciceroscm (dashed median), magicc (dotted median).
  title: "ScenarioMIP CMIP7 extensions: three-SCM ensemble (fig_extensions reproduction)"
  experiment: scenariomip_cmip7
  models: [fair, ciceroscm, magicc]
  pathways: [VL, L, LN, M, ML, H, HL]
  output_formats: [png, pdf]
